<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Design</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="startup-anim">
    <!-- Background Image Container -->
    <div class="background-container">
        <!-- Parallax Wrapper (handles mouse follow) -->
        <div id="parallax-wrapper">
            <!-- Float Wrapper (handles up and down float) -->
            <div class="float-wrapper">
                <!-- Image Wrapper (handles zoom) -->
                <!-- Note: Please save your robot image as 'robot.png' in this folder -->
                <img src="robot.png" alt="Robot Background" class="robot-bg" id="robot-img" onerror="this.src='https://via.placeholder.com/600x600/050505/ffffff?text=Save+your+image+as+robot.png'">
            </div>
        </div>
        <!-- A fallback CSS glow -->
        <div class="fallback-glow"></div>
    </div>

    <!-- Content Wrapper (Fades in after zoom) -->
    <div class="content-wrapper" id="content">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="6" height="6" rx="1" fill="white"/>
                    <rect x="4" y="14" width="6" height="6" rx="1" fill="white"/>
                    <rect x="14" y="14" width="6" height="6" rx="1" fill="white"/>
                    <path d="M14 10L20 4M20 4H15M20 4V9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>XTRACT</span>
            </div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Blog</a>
                <a href="#">Contact</a>
            </div>
            <a href="#" class="btn btn-primary nav-btn">Book a call</a>
        </nav>

        <!-- Main Hero Section -->
        <main class="hero">
            <div class="hero-content">
                <span class="badge">New</span>
                <h1>Intelligent Automation for<br>Modern Businesses.</h1>
                <p>Xtract brings AI automation to your fingertips & streamline tasks.</p>
                <div class="hero-buttons">
                    <a href="#" class="btn btn-primary">Get in touch <span class="arrow">↗</span></a>
                    <a href="#" class="btn btn-secondary">View services</a>
                </div>
            </div>
        </main>

        <!-- Floating Buttons (Bottom Right) -->
        <div class="floating-buttons">
            <a href="#" class="btn btn-primary floating-btn">Use For Free <span class="arrow">↗</span></a>
            <a href="#" class="btn btn-outline floating-btn">Another AI Template <span class="arrow">↗</span></a>
        </div>
    </div>

    <!-- Link the Javascript file -->
    <script src="script.js"></script>
</body>
</html>
